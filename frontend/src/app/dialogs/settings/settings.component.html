<h2 mat-dialog-title>Settings</h2>

<mat-dialog-content>
  <div class="fields">
    <mat-form-field appearance="outline" class="field-full">
      <mat-label>Location (city name)</mat-label>
      <input matInput [(ngModel)]="settings.location" placeholder="e.g. Novi Sad">
    </mat-form-field>

    <div class="field-row">
      <mat-form-field appearance="outline" class="field-half">
        <mat-label>Receiver weight (g)</mat-label>
        <input matInput
          [(ngModel)]="settings.receiverWeight"
          (input)="onDecimalInput($event)">
      </mat-form-field>

      <mat-form-field appearance="outline" class="field-half">
        <mat-label>Receiver power (mA)</mat-label>
        <input matInput
          [(ngModel)]="settings.receiverPowerConsumption"
          (input)="onDecimalInput($event)">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="field-full">
      <mat-label>Session duration (minutes)</mat-label>
      <input matInput
        [(ngModel)]="settings.sessionDuration"
        (input)="onNumericInput($event)">
    </mat-form-field>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
